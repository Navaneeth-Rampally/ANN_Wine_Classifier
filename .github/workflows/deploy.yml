name: Build and Deploy Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Inject CPU-only PyTorch for fast testing
        run: |
          echo "--extra-index-url https://download.pytorch.org/whl/cpu" > req_temp.txt
          cat requirements.txt >> req_temp.txt
          mv req_temp.txt requirements.txt

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          python test_project.py

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{secrets.AZURE_CREDENTIALS}}

      - name: Inject CPU-only PyTorch for Azure build
        run: |
          echo "--extra-index-url https://download.pytorch.org/whl/cpu" > req_temp.txt
          cat requirements.txt >> req_temp.txt
          mv req_temp.txt requirements.txt

      # STEP 1: Create the app and deploy the code FIRST
      - name: Deploy using az webapp up
        run: |
          az webapp up \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --runtime "PYTHON:3.11" \
            --os-type linux \
            --logs

      # STEP 2: Configure the settings AFTER the app is created
      - name: Configure Azure Web App settings
        run: |
          az webapp config appsettings set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}\
            --name ${{secrets.AZURE_WEBAPP_NAME}} \
            --settings WEBSITES_PORT=8000 SCM_DO_BUILD_DURING_DEPLOYMENT=true

          az webapp config set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}\
            --name ${{secrets.AZURE_WEBAPP_NAME}} \
            --startup-file "bash startup.sh"